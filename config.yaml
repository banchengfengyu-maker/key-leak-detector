# API密钥泄露检测器配置文件

# GitHub配置
github:
  # GitHub Personal Access Token（用于API访问）
  token: "${GITHUB_TOKEN}"
  
  # 搜索配置
  search:
    # 每次搜索的最大仓库数
    max_repositories: 1000
    # 低频高置信搜索队列，避免把GitHub Code Search当全站爬虫使用
    queries:
      - '"ghp_"'
      - '"github_pat_"'
      - '"sk_live_"'
      - '"AKIA"'
      - '"-----BEGIN RSA PRIVATE KEY-----"'
      - '"-----BEGIN PRIVATE KEY-----"'
      - '"mongodb+srv://"'
    # 每个查询单次最多确认的结果数
    per_query_limit: 2
    # 每个查询单次最多处理的搜索候选数，避免一直翻页空转
    max_candidates_per_query: 5
    # Search API每页结果数，保持较小以降低误触发限流的概率
    per_page: 5
    # 保存续扫页码和已提醒指纹
    state_file: "reports/scan_state.json"
    # 同一密钥指纹冷却天数
    cooldown_days: 30
    # 使用GitHub text_matches先做片段初筛，再拉完整文件
    use_text_matches: true
    # 扫描阶段不额外查询用户/仓库详情，降低触发二级限流的概率
    fetch_metadata: false
    # 搜索语言过滤（可选）
    languages: []
    # 搜索时间范围（天）
    time_range_days: 30

# 网页发现配置
discovery:
  # 可选: bing, searxng, duckduckgo
  web_provider: "bing"
  # 如果你有本地/自建 SearXNG，可以填写例如 http://127.0.0.1:8080
  web_base_url: ""
  # 网页搜索前缀
  web_query_prefix: "site:github.com (\".env\" OR \"config\" OR \"credentials\" OR \"secret\")"
  # GitHub网页搜索前缀
  github_query_prefix: "site:github.com"
  # Bing 搜索前缀
  bing_query_prefix: "site:github.com"
  timeout_seconds: 6

# 密钥检测配置
detection:
  # 启用的检测类型
  enabled_types:
    - aws_access_key
    - aws_secret_key
    - azure_storage_key
    - gcp_api_key
    - github_token
    - database_url
    - private_key
    - stripe_key
    - twilio_key
    - sendgrid_key
    - mailgun_key
    - slack_token
    - telegram_token
    
  # 误报过滤配置
  false_positive_filters:
    # 包含这些字符串的匹配可能不是真正的泄露
    exclude_patterns:
      - "example"
      - "test"
      - "mock"
      - "fake"
      - "dummy"
      - "placeholder"
      - "your_.*_here"
      - "xxx"
      - "placeholder"
    
    # 文件名排除列表
    exclude_files:
      - "*.md"
      - "*.txt"
      - "*.json"
      - "*.xml"
      - "*.yaml"
      - "*.yml"
      - "*.toml"
      - "*.ini"
      - "*.cfg"
      - "*.conf"
      - "*.env.example"
      - "*.env.sample"
      - "*.env.template"
      - "*.env.development"
      - "*.env.test"
      
    # 目录排除列表
    exclude_dirs:
      - "test"
      - "tests"
      - "__pycache__"
      - "node_modules"
      - ".git"
      - "vendor"
      - "dist"
      - "build"
      - ".github"

# 通知配置
notification:
  # 默认只生成报告。主动发Issue/邮件前，人工把报告中的
  # approved_for_notification 改为 true 后再执行 notify。
  require_manual_review: true
  # 启用的通知方式
  enabled_methods:
    - github_issue
    - email
    - report_only
    
  # GitHub Issue配置
  github_issue:
    # Issue标题模板
    title_template: "⚠️ Security Alert: Potential API Key Leak Detected"
    # Issue标签
    labels:
      - "security"
      - "leak-detected"
      - "automated"
    # Issue内容模板
    content_template: |
      ## Security Alert: Potential API Key Leak
      
      **Repository:** {repo_name}
      **File:** {file_path}
      **Line:** {line_number}
      **Key Type:** {key_type}
      **Severity:** {severity}
      **Detected at:** {timestamp}
      
      ### Details
      
      A potential API key leak has been detected in this repository. The key appears to be a `{key_type}` that may have been accidentally committed.
      I did not use, validate, or store the full secret. The local report keeps only a masked snippet and a non-reversible fingerprint so you can rotate and clean it up safely.
      
      ### Recommended Actions
      
      1. **Rotate the key immediately** - Revoke the compromised key and generate a new one
      2. **Check for unauthorized access** - Review access logs for any suspicious activity
      3. **Update your code** - Remove the hardcoded key and use environment variables
      4. **Add to .gitignore** - Ensure sensitive files are not committed
      
      ### How to Fix
      
      1. Remove the key from the file: `{file_path}` (line {line_number})
      2. Use environment variables or a secrets manager instead
      3. Add the file to `.gitignore` if it contains secrets
      
      If this alert helped, a star for the project would help other developers find it:
      https://github.com/banchengfengyu-maker/key-leak-detector
      
      ### Resources
      
      - [GitHub Secret Scanning](https://docs.github.com/en/code-security/secret-scanning)
      - [Keeping your tokens and credentials secure](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/creating-a-personal-access-token)
      
      ---
      *This issue was automatically generated by [Key Leak Detector](https://github.com/banchengfengyu-maker/key-leak-detector)*
      
  # 邮件配置
  email:
    # SMTP服务器配置
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    smtp_user: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    use_tls: true
    
    # 邮件模板
    subject_template: "Security Alert: Potential API Key Leak in {repo_name}"
    content_template: |
      Dear {author_name},
      
      This is an automated security alert from the Key Leak Detector.
      
      We have detected a potential API key leak in your repository:
      
      - Repository: {repo_name}
      - File: {file_path}
      - Line: {line_number}
      - Key Type: {key_type}
      - Severity: {severity}
      
      I did not use, validate, or store the full secret. The local report keeps only a masked snippet and a non-reversible fingerprint so you can rotate and clean it up safely.
      
      Please take immediate action to:
      1. Rotate the compromised key
      2. Remove the key from the code
      3. Use environment variables or secrets management
      
      For more information, please visit: {repo_url}
      
      If this alert helped, a star for the project would help other developers find it:
      https://github.com/banchengfengyu-maker/key-leak-detector
      
      Best regards,
      Key Leak Detector Team
      
# 报告配置
report:
  # 报告格式
  format: "json"  # json, csv, markdown
  # 输出目录
  output_dir: "reports"
  # 保留报告数量
  max_reports: 100

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/key-leak-detector.log"
  max_size_mb: 10
  backup_count: 5
