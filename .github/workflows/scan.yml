name: Key Leak Scanner

on:
  workflow_dispatch:

jobs:
  scan:
    name: Scan for API Key Leaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scanner
        run: python main.py scan --max-results 10
        env:
          GITHUB_TOKEN: ${{ secrets.KEY_LEAK_DETECTOR }}
      
      - name: List reports
        if: always()
        run: |
          echo "=== Reports Directory ==="
          ls -la reports/ 2>/dev/null || echo "Directory not found"
          echo ""
          echo "=== Report Files ==="
          find reports/ -name "*.json" -type f 2>/dev/null || echo "No JSON files"
          echo ""
          echo "=== Report Content ==="
          cat reports/scan_report_*.json 2>/dev/null || echo "No reports to show"
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report-${{ github.run_number }}
          path: reports/*.json
          if-no-files-found: ignore
          retention-days: 7
