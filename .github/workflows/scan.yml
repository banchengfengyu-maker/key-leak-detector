name: API Key Leak Scanner

on:
  # 定时运行：每天 UTC 时间 02:00 运行
  schedule:
    - cron: '0 2 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      query:
        description: '自定义搜索查询'
        required: false
        type: string
      max_results:
        description: '最大结果数'
        required: false
        default: '100'
        type: string
      notify_method:
        description: '通知方式'
        required: false
        default: 'github_issue'
        type: choice
        options:
          - github_issue
          - email
          - report_only

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  scan:
    name: Scan for API Key Leaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
      
      - name: Validate configuration
        run: |
          source venv/bin/activate
          python -c "
          from src.utils import load_config
          config = load_config('config.yaml')
          print('Configuration loaded successfully')
          
          # Check GitHub token
          github_token = config.get('github', {}).get('token', '')
          if not github_token or github_token.startswith('\${'):
              print('Warning: GitHub token not configured')
          else:
              print(f'GitHub token configured (length: {len(github_token)})')
          "
        env:
          GITHUB_TOKEN: ${{ secrets.KEY_LEAK_DETECTOR }}
      
      - name: Run scanner
        run: |
          source venv/bin/activate
          python main.py scan --max-results 10
        env:
          GITHUB_TOKEN: ${{ secrets.KEY_LEAK_DETECTOR }}
      
      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
      
      - name: Create issue with results
        if: inputs.notify_method == 'github_issue' || github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read scan report
            const reportsDir = 'reports';
            if (!fs.existsSync(reportsDir)) {
              console.log('No reports directory found');
              return;
            }
            
            const files = fs.readdirSync(reportsDir);
            const reportFiles = files.filter(f => f.startsWith('scan_report_') && f.endsWith('.json'));
            
            if (reportFiles.length === 0) {
              console.log('No scan reports found');
              return;
            }
            
            // Get the latest report
            const latestReport = reportFiles.sort().pop();
            const reportPath = path.join(reportsDir, latestReport);
            
            try {
              const reportData = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              
              if (reportData.length === 0) {
                console.log('No leaks found in scan');
                return;
              }
              
              // Create summary
              const summary = reportData.map(item => {
                return `### ${item.repo_name}\n` +
                  `- **File:** ${item.file_path}\n` +
                  `- **Line:** ${item.line_number}\n` +
                  `- **Key Type:** ${item.key_type}\n` +
                  `- **Severity:** ${item.severity}\n` +
                  `- **Detected at:** ${item.timestamp}\n`;
              }).join('\n');
              
              // Create issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Security Scan Results - ${new Date().toISOString().split('T')[0]}`,
                body: `## API Key Leak Scan Results\n\n` +
                  `**Scan Date:** ${new Date().toISOString()}\n\n` +
                  `**Total Leaks Found:** ${reportData.length}\n\n` +
                  `### Summary\n\n${summary}\n\n` +
                  `### Action Required\n\n` +
                  `Please review the scan report and take appropriate action to rotate any compromised keys.\n\n` +
                  `---\n*This issue was automatically generated by the API Key Leak Scanner*`,
                labels: ['security', 'scan-results', 'automated']
              });
              
              console.log('Issue created successfully');
              
            } catch (error) {
              console.error('Error processing report:', error);
            }
      
      - name: Notify via email (if configured)
        if: inputs.notify_method == 'email'
        run: |
          echo "Email notification would be sent here"
          echo "Note: Email notification requires SMTP configuration"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      
      - name: Archive and clean up
        if: always()
        run: |
          # Archive reports
          if [ -d "reports" ]; then
            tar -czf scan-reports-${{ github.run_number }}.tar.gz reports/
          fi
          
          # Clean up old reports (keep last 10)
          find reports/ -name "scan_report_*.json" -type f | sort | head -n -10 | xargs rm -f 2>/dev/null || true
      
      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/
          category: api-key-leak-scan