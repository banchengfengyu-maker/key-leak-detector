name: Key Leak Scanner

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  scan:
    name: Scan for API Key Leaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run scanner
        run: python main.py scan --max-results 10
        env:
          GITHUB_TOKEN: ${{ secrets.KEY_LEAK_DETECTOR }}
      
      - name: Show results
        if: always()
        run: |
          echo "=== Reports ==="
          ls -la reports/ 2>/dev/null || echo "No reports dir"
          cat reports/*.json 2>/dev/null || echo "No reports"
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report
          path: reports/
          retention-days: 7
